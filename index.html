<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLDS - BLACKLIGHTDOMS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Times New Roman",serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;

text-shadow:
0 0 4px rgba(255,255,255,.5),
0 0 8px rgba(255,255,255,.25);
}

.container{
width:100%;
min-height:100vh;

display:flex;
flex-direction:column;
align-items:center;

padding:30px 20px 50px;
}

/* ========================= */
/* LOGO */
/* ========================= */

.logo{
width:150px;
margin-top:25px;

animation:float 4s ease-in-out infinite;

filter:
drop-shadow(0 0 4px rgba(255,255,255,.35))
drop-shadow(0 0 8px rgba(255,255,255,.25));
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0px);
}

}

.title{
margin-top:18px;

font-size:28px;
font-weight:600;

letter-spacing:3px;
text-align:center;

text-shadow:
0 0 6px rgba(255,255,255,.9),
0 0 12px rgba(255,255,255,.5),
0 0 25px rgba(255,255,255,.2);
}

/* ========================= */
/* CHAPTER */
/* ========================= */

.chapter-list{
width:100%;
max-width:320px;

margin-top:50px;
}

.chapter{
margin-bottom:16px;
}

.chapter-btn{

width:100%;

padding:12px;

font-size:15px;
letter-spacing:2px;

color:white;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.15);

cursor:pointer;

transition:.35s;

backdrop-filter:blur(8px);

text-shadow:
0 0 5px rgba(255,255,255,.2);

}

.chapter-btn:hover{

transform:translateY(-2px);

background:
rgba(255,255,255,.08);

border-color:
rgba(255,255,255,.4);

box-shadow:
0 0 8px rgba(255,255,255,.2);

}

.coming{

margin-top:4px;

font-size:10px;

letter-spacing:3px;

opacity:.45;

text-align:center;

}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer{

margin-top:70px;

text-align:center;

}

.social{

margin:12px 0;

}

.social a{

color:white;

text-decoration:none;

font-size:13px;

opacity:.8;

transition:.3s;

}

.social a:hover{

opacity:1;

text-shadow:
0 0 8px rgba(255,255,255,.5);

}

.copyright{

margin-top:35px;

font-size:11px;

letter-spacing:2px;

opacity:.45;

}

/* ========================= */
/* TRANSITION */
/* ========================= */

#transition{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

opacity:0;
pointer-events:none;

transition:1s;

z-index:9999;

}

#transition.active{

opacity:1;
pointer-events:all;

}

.loading{

font-size:15px;

letter-spacing:5px;

text-shadow:
0 0 6px rgba(255,255,255,.3);

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{
opacity:.25;
}

50%{
opacity:1;
}

100%{
opacity:.25;
}

}

.light-line{

width:180px;
height:1px;

background:white;

margin-top:15px;

box-shadow:
0 0 10px white;

animation:lineGlow 2s infinite;

}

@keyframes lineGlow{

0%{
opacity:.2;
}

50%{
opacity:1;
}

100%{
opacity:.2;
}

}

</style>
</head>

<body>

<div id="transition">

<div class="loading">
LOADING CHAPTER I
</div>

<div class="light-line"></div>

</div>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">
BLACKLIGHTDOMS
</div>

<div class="chapter-list">

<div class="chapter">
<button class="chapter-btn" onclick="openChapter1()">
CHAPTER 1
</button>
</div>

<div class="chapter">
<button class="chapter-btn" onclick="openChapter2()">
CHAPTER 2
</button>
</div>

<div class="chapter">
<button class="chapter-btn" onclick="openChapter3()">
CHAPTER 3
</button>
</div>

<div class="chapter">
<button class="chapter-btn" onclick="openChapter4()">
CHAPTER 4
</button>
</div>

<div class="chapter">
<button class="chapter-btn">
CHAPTER 5
</button>
<div class="coming">
COMING SOON
</div>
</div>

</div>

<div class="footer">

<div class="social">
<a href="https://discord.gg/r4dM4QFteV" target="_blank">
Discord Server
</a>
</div>

<div class="social">
<a href="https://chat.whatsapp.com/LYhSQn3vXhO6qpVWyoJEoR?s=cl&p=a&ilr=1" target="_blank">
WhatsApp Community
</a>
</div>

<div class="copyright">
BLACKLIGHTDOMS©2026
</div>

</div>

</div>

<script>

function openChapter1(){

const transition =
document.getElementById("transition");

transition.classList.add("active");

setTimeout(()=>{

window.location.href="chapter1.html";

},1800);

}

function openChapter2(){

const transition =
document.getElementById("transition");

transition.classList.add("active");

document.querySelector(".loading").innerText =
"LOADING CHAPTER II";

setTimeout(()=>{

window.location.href="chapter2.html";

},1800);

}

function openChapter3(){

const transition =
document.getElementById("transition");

transition.classList.add("active");

document.querySelector(".loading").innerText =
"LOADING CHAPTER III";

setTimeout(()=>{

window.location.href="chapter3.html";

},1800);

}

function openChapter4(){

const transition =
document.getElementById("transition");

transition.classList.add("active");

document.querySelector(".loading").innerText =
"LOADING CHAPTER IV";

setTimeout(()=>{

window.location.href="chapter4.html";

},1800);

}

</script>

</body>
</html>
