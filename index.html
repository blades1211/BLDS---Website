<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLDS - BlackLightDoms</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Times New Roman', serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
min-height:100vh;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px 20px;
}

.logo{
width:180px;
margin-top:30px;
animation:float 4s ease-in-out infinite;
filter:
drop-shadow(0 0 10px #ffffff)
drop-shadow(0 0 20px #ffffff)
drop-shadow(0 0 40px #ffffff);
}

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-15px);
}
100%{
transform:translateY(0px);
}
}

.title{
margin-top:20px;
font-size:38px;
letter-spacing:4px;
font-weight:bold;
text-align:center;
}

.chapter-list{
margin-top:50px;
width:100%;
max-width:400px;
}

.chapter{
margin-bottom:18px;
}

.chapter-btn{
width:100%;
padding:18px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.15);
color:white;
font-size:20px;
cursor:pointer;
transition:0.35s;
backdrop-filter:blur(10px);
}

.chapter-btn:hover{
transform:translateY(-3px);
background:white;
color:black;
box-shadow:0 0 25px white;
}

.coming{
text-align:center;
font-size:12px;
margin-top:5px;
opacity:.6;
letter-spacing:2px;
}

.footer{
margin-top:80px;
text-align:center;
}

.social{
margin:10px 0;
}

.social a{
color:white;
text-decoration:none;
transition:.3s;
}

.social a:hover{
text-shadow:0 0 10px white;
}

.copyright{
margin-top:40px;
opacity:.7;
letter-spacing:2px;
font-size:13px;
}

/* TRANSITION */

#transition{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
opacity:0;
pointer-events:none;
transition:.8s;
}

#transition.active{
opacity:1;
pointer-events:all;
}

.loading{
font-size:28px;
letter-spacing:4px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:.3;}
50%{opacity:1;}
100%{opacity:.3;}
}
</style>
</head>

<body>

<div id="transition">
<div class="loading">LOADING CHAPTER I...</div>
</div>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">
BLACKLIGHTDOMS
</div>

<div class="chapter-list">

<div class="chapter">
<button class="chapter-btn" onclick="openChapter1()">
CHAPTER 1
</button>
</div>

<div class="chapter">
<button class="chapter-btn">
CHAPTER 2
</button>
<div class="coming">COMING SOON</div>
</div>

<div class="chapter">
<button class="chapter-btn">
CHAPTER 3
</button>
<div class="coming">COMING SOON</div>
</div>

<div class="chapter">
<button class="chapter-btn">
CHAPTER 4
</button>
<div class="coming">COMING SOON</div>
</div>

<div class="chapter">
<button class="chapter-btn">
CHAPTER 5
</button>
<div class="coming">COMING SOON</div>
</div>

</div>

<div class="footer">

<div class="social">
<a href="https://discord.gg/r4dM4QFteV" target="_blank">
Discord Server
</a>
</div>

<div class="social">
<a href="https://chat.whatsapp.com/LYhSQn3vXhO6qpVWyoJEoR?s=cl&p=a&ilr=1" target="_blank">
WhatsApp Community
</a>
</div>

<div class="copyright">
BLACKLIGHTDOMS©2026
</div>

</div>

</div>

<script>
function openChapter1(){

const transition =
document.getElementById("transition");

transition.classList.add("active");

setTimeout(()=>{
window.location.href="chapter1.html";
},1800);

}
</script>

</body>
</html>
